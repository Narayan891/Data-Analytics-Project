services:
  # Backend Web Service
  - type: web
    name: zoo-analytics-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn main:app --workers 4 --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    rootContext: backend
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: zoo-analytics-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256

  # Frontend Static Site
  - type: static
    name: zoo-analytics-frontend
    env: node
    buildCommand: npm install && npm run build
    publishPath: build
    rootContext: frontend
    envVars:
      - key: REACT_APP_API_URL
        fromService:
          type: web
          name: zoo-analytics-backend
          property: host

databases:
  - name: zoo-analytics-db
    plan: free
